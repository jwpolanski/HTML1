<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CWP · Asystent FAQ</title>
<style>
  :root{
    --orange-lt:#FF8A3D;
    --orange:#FB542B;
    --red:#E11303;
    --red-deep:#8E1003;
    --red-050:#fff2ec;
    --ink:#211512;
    --muted:#85726b;
    --bg:#fdf6f3;
    --card:#ffffff;
    --bubble-bot:#fff3ee;
    --bubble-user:linear-gradient(135deg,var(--orange),var(--red));
    --logo-grad:linear-gradient(135deg,#FF9A4D 0%,#FB542B 52%,#EA1A00 100%);
    --header-grad:linear-gradient(135deg,#EA3A0E 0%,#8E1003 100%);
    --shadow:0 22px 60px -22px rgba(225,19,3,.5);
    --radius:24px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    min-height:100%;
    background:
      radial-gradient(1200px 600px at 82% -8%, #ffe0cf 0%, transparent 55%),
      radial-gradient(900px 520px at -10% 110%, #ffd6c6 0%, transparent 50%),
      var(--bg);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .app{
    width:clamp(460px,50vw,900px);
    height:min(900px,90vh);
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;
    border:1px solid #f6ddd2;
  }
  .top{
    background:var(--header-grad);
    color:#fff;padding:20px 24px;display:flex;align-items:center;gap:13px;
  }
  .back{
    appearance:none;border:none;cursor:pointer;width:38px;height:38px;flex:0 0 38px;border-radius:11px;
    background:rgba(255,255,255,.14);color:#fff;display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .back:hover{background:rgba(255,255,255,.28)}
  .back:active{transform:scale(.92)}
  .logo{
    width:54px;height:54px;flex:0 0 54px;border-radius:50%;
    background:var(--logo-grad);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px -4px rgba(234,26,0,.6), inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .brand h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.3px}
  .brand p{margin:3px 0 0;font-size:13px;opacity:.88}
  .status{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12.5px;opacity:.92}
  .dot{width:9px;height:9px;border-radius:50%;background:#5dff9c;box-shadow:0 0 0 4px rgba(93,255,156,.18)}
  .chat{flex:1;overflow-y:auto;padding:26px 28px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  .chat::-webkit-scrollbar{width:9px}
  .chat::-webkit-scrollbar-thumb{background:#f1cdbf;border-radius:8px}
  .welcome{text-align:center;padding:24px 6px 4px;animation:fade .5s ease}
  .welcome .crest{width:104px;height:104px;margin:8px auto 16px;border-radius:50%;
    background:var(--logo-grad);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .welcome h2{margin:0 0 8px;font-size:25px}
  .welcome p{margin:0 auto;max-width:360px;color:var(--muted);font-size:15px;line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:22px}
  .chip{
    border:1px solid #ffd2bf;background:var(--red-050);color:#C73A12;
    padding:10px 15px;border-radius:999px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;
  }
  .chip:hover{background:var(--orange);color:#fff;border-color:var(--orange);transform:translateY(-1px)}
  .row{display:flex;gap:11px;align-items:flex-end;max-width:82%;animation:pop .25s ease}
  .row.user{margin-left:auto;flex-direction:row-reverse}
  .av{width:36px;height:36px;flex:0 0 36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
     background:var(--logo-grad)}
  .row.user .av{background:#2b1f1b;border-radius:11px}
  .bubble{padding:13px 16px;border-radius:18px;font-size:15px;line-height:1.55;white-space:pre-wrap}
  .row.bot .bubble{background:var(--bubble-bot);border:1px solid #f9dccf;border-bottom-left-radius:6px}
  .row.user .bubble{background:var(--bubble-user);color:#fff;border-bottom-right-radius:6px}
  .typing{display:flex;gap:5px;padding:15px 17px}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--orange);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  .bar{padding:16px 18px;border-top:1px solid #f6ddd2;display:flex;gap:12px;background:#fff}
  .bar input{
    flex:1;border:1.5px solid #f3d4c7;border-radius:15px;padding:15px 17px;font-size:15px;outline:none;transition:.15s;font-family:inherit;
  }
  .bar input:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(251,84,43,.14)}
  .send{
    border:none;cursor:pointer;width:54px;border-radius:15px;color:#fff;
    background:linear-gradient(135deg,var(--orange),var(--red));
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .send:hover{filter:brightness(1.07)}
  .send:active{transform:scale(.95)}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);padding:0 0 12px}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
</style>
</head>
<body>
  <div class="app">
    <div class="top">
      <button class="back" id="back" aria-label="Powrót" title="Nowa rozmowa">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <div class="logo" id="logoSlot"></div>
      <div class="brand">
        <h1>CWP Asystent</h1>
        <p>Firmowe FAQ — zapytaj o cokolwiek</p>
      </div>
      <div class="status"><span class="dot"></span>online</div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="bar">
      <input id="input" type="text" placeholder="Napisz pytanie..." autocomplete="off" />
      <button class="send" id="send" aria-label="Wyślij">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-7-7 16-2-7-7-2z" fill="#fff"/></svg>
      </button>
    </div>
    <div class="foot">CWP · napędzane przez n8n + AI</div>
  </div>
<script>
/* ============================================================
   KONFIGURACJA — podłączenie do n8n
   URL webhooka czatu (nowa gałąź "chat-web"). Wpisz "" aby wrócić do trybu DEMO.
   ============================================================ */
const N8N_WEBHOOK_URL = "https://jwpolanski.app.n8n.cloud/webhook/chat-web";
let SESSION_ID = "web-" + Math.random().toString(36).slice(2, 10);

/* ---- Lew (biały lineart, rysowany proceduralnie) ---- */
function lion(px){
  const cx=32, cy=32, rIn=12.5, rOut=19.5, N=11;
  let d="";
  for(let i=0;i<N;i++){
    const a0=(i/N)*2*Math.PI - Math.PI/2;
    const a1=((i+1)/N)*2*Math.PI - Math.PI/2;
    const am=(a0+a1)/2;
    const x0=(cx+rIn*Math.cos(a0)).toFixed(1), y0=(cy+rIn*Math.sin(a0)).toFixed(1);
    const xm=(cx+rOut*Math.cos(am)).toFixed(1), ym=(cy+rOut*Math.sin(am)).toFixed(1);
    const x1=(cx+rIn*Math.cos(a1)).toFixed(1), y1=(cy+rIn*Math.sin(a1)).toFixed(1);
    if(i===0) d+=`M${x0} ${y0} `;
    d+=`Q${xm} ${ym} ${x1} ${y1} `;
  }
  d+="Z";
  return `
  <svg width="${px}" height="${px}" viewBox="0 0 64 64" fill="none" stroke="#fff"
       stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="${d}"/>
    <path d="M24 24c-3-2-3-6 0-7 2 1 3 4 2 7"/>
    <path d="M40 24c3-2 3-6 0-7-2 1-3 4-2 7"/>
    <path d="M25.5 31.5c1.6-1.6 4-1.6 5.6 0"/>
    <path d="M32.9 31.5c1.6-1.6 4-1.6 5.6 0"/>
    <path d="M29.5 36h5l-2.5 3z" fill="#fff" stroke="none"/>
    <path d="M32 39v2.6"/>
    <path d="M32 41.6c-1.6 1.7-3.6 1.7-5 .4"/>
    <path d="M32 41.6c1.6 1.7 3.6 1.7 5 .4"/>
  </svg>`;
}

const SUGGESTIONS = [
  "Ile dni urlopu okolicznościowego na ślub?",
  "Jestem nowym pracownikiem — od czego zacząć?",
  "Jak złożyć wniosek urlopowy?",
];
const DEMO = [
  { k:["ślub","slub","okolicznoś","okolicznos","wesel"], a:"Zgodnie z Regulaminem pracy przysługują Ci 2 dni urlopu okolicznościowego z okazji własnego ślubu. Wniosek złóż w systemie HRM z odpowiednim typem nieobecności." },
  { k:["nowy","nowym","zacząć","zaczac","onboarding"], a:"Witaj na pokładzie! Zacznij od odebrania konta w HRM, zapoznania się z Regulaminem pracy i kontaktu z opiekunem wdrożenia. Checklist znajdziesz w sekcji „Onboarding”." },
  { k:["wniosek","urlop","wnios"], a:"Wnioski urlopowe składasz w systemie HRM: wybierz typ nieobecności, zakres dat i zatwierdź. Przełożony dostanie powiadomienie do akceptacji." },
];

const chat=document.getElementById('chat');
const input=document.getElementById('input'), send=document.getElementById('send'), back=document.getElementById('back');
document.getElementById('logoSlot').innerHTML = lion(34);

function showWelcome(){
  chat.innerHTML='';
  const w=document.createElement('div');w.className='welcome';
  w.innerHTML=`<div class="crest">${lion(66)}</div>
    <h2>Witaj w CWP 👋</h2>
    <p>Jestem firmowym asystentem. Odpowiadam na podstawie naszej bazy wiedzy. O co chcesz zapytać?</p>
    <div class="chips"></div>`;
  chat.appendChild(w);
  const cb=w.querySelector('.chips');
  SUGGESTIONS.forEach(s=>{const c=document.createElement('button');c.className='chip';c.textContent=s;c.onclick=()=>{input.value=s;submit();};cb.appendChild(c);});
}

function avatar(isUser){
  const d=document.createElement('div');d.className='av';
  d.innerHTML=isUser
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>'
    : lion(24);
  return d;
}
function addMsg(text,isUser){
  const w=chat.querySelector('.welcome');if(w)w.remove();
  const row=document.createElement('div');row.className='row '+(isUser?'user':'bot');
  const b=document.createElement('div');b.className='bubble';b.textContent=text;
  row.appendChild(avatar(isUser));row.appendChild(b);
  chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
}
function showTyping(){
  const row=document.createElement('div');row.className='row bot';row.id='typingRow';
  const t=document.createElement('div');t.className='bubble typing';t.innerHTML='<span></span><span></span><span></span>';
  row.appendChild(avatar(false));row.appendChild(t);chat.appendChild(row);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const r=document.getElementById('typingRow');if(r)r.remove();}
function demoAnswer(q){
  const low=q.toLowerCase();
  const hit=DEMO.find(d=>d.k.some(k=>low.includes(k)));
  return hit?hit.a:"Przykro mi, nie znalazłem tego w bazie FAQ. Skontaktuj się z Moniczką, która chętnie pomoże.";
}
async function getAnswer(q){
  if(!N8N_WEBHOOK_URL){await new Promise(r=>setTimeout(r,700+Math.random()*600));return demoAnswer(q);}
  try{
    const res=await fetch(N8N_WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"sendMessage",chatInput:q,sessionId:SESSION_ID})});
    let data=await res.json().catch(()=>({}));
    if(Array.isArray(data)) data=data[0]||{};
    return data.output||data.text||data.answer||data.response||"Otrzymałem pustą odpowiedź z serwera.";
  }catch(e){return "Nie mogę teraz połączyć się z serwerem. Spróbuj ponownie za chwilę.";}
}
async function submit(){
  const q=input.value.trim();if(!q)return;
  addMsg(q,true);input.value='';showTyping();
  const a=await getAnswer(q);hideTyping();addMsg(a,false);
}

/* strzałka: powrót do ekranu powitalnego + nowa sesja */
back.onclick=()=>{ SESSION_ID="web-"+Math.random().toString(36).slice(2,10); showWelcome(); input.value=''; input.focus(); };

send.onclick=submit;
input.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
showWelcome();
input.focus();
</script>
</body>
</html>
